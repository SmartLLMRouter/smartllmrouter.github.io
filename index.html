<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartLLMRouter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; max-width: 500px; }
    .buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #c4b5fd; border: 1px solid rgba(255,255,255,0.15); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    footer { margin-top: 3rem; font-size: 0.85rem; color: #64748b; }
    footer a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="logo">🧠</div>
  <h1>SmartLLMRouter</h1>
  <p class="tagline">A lightweight macOS proxy that distributes LLM API requests across multiple providers with intelligent routing.</p>
  <div class="buttons">
    <a href="https://github.com/SmartLLMRouter/SmartLLMRouter" class="btn btn-primary">View on GitHub</a>
    <a href="https://github.com/SmartLLMRouter/SmartLLMRouter/releases/latest" class="btn btn-secondary">Download Latest</a>
  </div>
  <footer>
    <p>© 2025–2026 <a href="https://github.com/SmartLLMRouter">SmartLLMRouter</a></p>
  </footer>
</body>
</html>
